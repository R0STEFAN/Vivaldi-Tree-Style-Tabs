name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Build Mod files
      run: node build/build.mjs

    - name: Zip Mod files
      run: |
        Compress-Archive -Path dist\custom.js, dist\svb-folder.html -DestinationPath mod.zip

    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Build Go Updater
      working-directory: ./updater
      run: |
        go mod tidy
        go build -ldflags "-H=windowsgui" -o svb-updater.exe .

    - name: Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          mod.zip
          updater/svb-updater.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
